  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("scoreEl");
    const bestEl = document.getElementById("bestEl");
    const speedEl = document.getElementById("speedEl");
    const statusEl = document.getElementById("statusEl");
    const overlay = document.getElementById("gameOverlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const overlayStartBtn = document.getElementById("overlayStartBtn");
    const grid = 24;
    const cell = canvas.width / grid;
    const vectors = {
      up: { x: 0, y: -1 },
      down: { x: 0, y: 1 },
      left: { x: -1, y: 0 },
      right: { x: 1, y: 0 }
    };
    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let best = Number(localStorage.getItem("arcadeSnakeBest") || "0");
    let running = false;
    let paused = false;
    let gameOver = false;
    let lastTime = 0;
    let stepMs = 135;

    function resetState() {
      snake = [{ x: 11, y: 12 }, { x: 10, y: 12 }, { x: 9, y: 12 }];
      direction = vectors.right;
      nextDirection = vectors.right;
      score = 0;
      stepMs = 135;
      lastTime = 0;
      paused = false;
      gameOver = false;
      placeFood();
      syncUi("대기 중");
      draw();
    }

    function syncUi(status) {
      scoreEl.textContent = String(score);
      bestEl.textContent = String(best);
      speedEl.textContent = String(Math.max(1, Math.floor((155 - stepMs) / 15) + 1));
      statusEl.textContent = status;
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * grid),
          y: Math.floor(Math.random() * grid)
        };
      } while (snake.some(part => part.x === food.x && part.y === food.y));
    }

    function drawCell(x, y, fill, inset = 2) {
      ctx.fillStyle = fill;
      ctx.fillRect(x * cell + inset, y * cell + inset, cell - inset * 2, cell - inset * 2);
    }

    function draw() {
      ctx.fillStyle = "#020617";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = "rgba(148, 163, 184, 0.12)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= grid; i += 1) {
        const p = i * cell;
        ctx.beginPath();
        ctx.moveTo(p, 0);
        ctx.lineTo(p, canvas.height);
        ctx.moveTo(0, p);
        ctx.lineTo(canvas.width, p);
        ctx.stroke();
      }
      drawCell(food.x, food.y, "#f43f5e", 4);
      snake.forEach((part, index) => {
        drawCell(part.x, part.y, index === 0 ? "#22d3ee" : "#34d399", index === 0 ? 2 : 3);
      });
    }

    function setDirection(next) {
      const vector = vectors[next];
      if (!vector || (vector.x + direction.x === 0 && vector.y + direction.y === 0)) return;
      nextDirection = vector;
      if (!running && !gameOver) startGame();
    }

    function startGame() {
      if (gameOver) resetState();
      if (running && !paused) return;
      running = true;
      paused = false;
      lastTime = 0;
      overlay.classList.add("hidden");
      syncUi("플레이 중");
      requestAnimationFrame(loop);
    }

    function togglePause() {
      if (!running || gameOver) return;
      paused = !paused;
      overlayTitle.textContent = "일시정지";
      overlayText.textContent = "다시 움직이려면 일시정지 버튼이나 스페이스 키를 누르세요.";
      overlayStartBtn.textContent = "계속하기";
      overlay.classList.toggle("hidden", !paused);
      syncUi(paused ? "일시정지" : "플레이 중");
      if (!paused) requestAnimationFrame(loop);
    }

    function endGame() {
      running = false;
      gameOver = true;
      best = Math.max(best, score);
      localStorage.setItem("arcadeSnakeBest", String(best));
      overlayTitle.textContent = "게임 종료";
      overlayText.textContent = `점수 ${score}점. 다시 시작해서 최고 기록을 갱신해보세요.`;
      overlayStartBtn.textContent = "다시 시작";
      overlay.classList.remove("hidden");
      syncUi("게임 종료");
      draw();
    }

    function step() {
      direction = nextDirection;
      const head = snake[0];
      const nextHead = { x: head.x + direction.x, y: head.y + direction.y };
      const hitWall = nextHead.x < 0 || nextHead.x >= grid || nextHead.y < 0 || nextHead.y >= grid;
      const hitBody = snake.some(part => part.x === nextHead.x && part.y === nextHead.y);
      if (hitWall || hitBody) {
        endGame();
        return;
      }
      snake.unshift(nextHead);
      if (nextHead.x === food.x && nextHead.y === food.y) {
        score += 10;
        stepMs = Math.max(70, stepMs - 3);
        placeFood();
      } else {
        snake.pop();
      }
      syncUi("플레이 중");
      draw();
    }

    function loop(time) {
      if (!running || paused || gameOver) return;
      if (!lastTime) lastTime = time;
      if (time - lastTime >= stepMs) {
        lastTime = time;
        step();
      }
      requestAnimationFrame(loop);
    }

    document.addEventListener("keydown", (event) => {
      const map = {
        ArrowUp: "up",
        KeyW: "up",
        ArrowDown: "down",
        KeyS: "down",
        ArrowLeft: "left",
        KeyA: "left",
        ArrowRight: "right",
        KeyD: "right"
      };
      if (event.code === "Space") {
        event.preventDefault();
        togglePause();
        return;
      }
      if (map[event.code]) {
        event.preventDefault();
        setDirection(map[event.code]);
      }
    });

    document.querySelectorAll("[data-dir]").forEach(button => {
      button.addEventListener("click", () => setDirection(button.dataset.dir));
    });
    startBtn.addEventListener("click", startGame);
    overlayStartBtn.addEventListener("click", startGame);
    pauseBtn.addEventListener("click", togglePause);
    resetBtn.addEventListener("click", () => {
      running = false;
      resetState();
      overlayTitle.textContent = "스네이크";
      overlayText.textContent = "시작을 누르고 먹이를 먹으며 몸을 길게 늘려보세요. 벽이나 몸에 부딪히면 게임이 끝납니다.";
      overlayStartBtn.textContent = "플레이";
      overlay.classList.remove("hidden");
    });

    resetState();
  </script>
