<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="6개의 질문으로 나의 감정 궤도를 별빛으로 표현해 보는 심리 테스트">
  <meta name="keywords" content="감정 테스트, 별빛 테스트, 감정 별자리, mood test">
  <meta name="google-adsense-account" content="ca-pub-1087435977438565">
  <meta name="author" content="partygame.pe.kr">
  <link rel="canonical" href="https://partygame.pe.kr/brainTest/pages/brainTest/starlit-mood-test.html">
  <meta property="og:type" content="article">
  <meta property="og:title" content="별빛 감정 궤도 테스트">
  <meta property="og:description" content="6문항으로 나의 감정 궤도를 별빛으로 표현해 보는 테스트">
  <meta property="og:image" content="https://images.unsplash.com/photo-1470472304068-4398a9daab00?auto=format&fit=crop&w=900&q=80">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1087435977438565"
          crossorigin="anonymous"></script>
  <script>
    window.adsbygoogle = window.adsbygoogle || [];
    if (!window.__AD_SENSE_INITIALIZED__) {
      window.adsbygoogle.push({
        google_ad_client: "ca-pub-1087435977438565",
        enable_page_level_ads: true
      });
      window.__AD_SENSE_INITIALIZED__ = true;
    }
  </script>
  <title>별빛 감정 궤도 테스트</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-purple-950 via-slate-900 to-black text-slate-50">
  <div class="max-w-4xl mx-auto px-6 py-12 space-y-8">
    <header class="text-center space-y-3">
      <p class="uppercase text-xs tracking-[0.3em] text-purple-200">Starlit Mood Test</p>
      <h1 class="text-3xl md:text-4xl font-extrabold">별빛 감정 궤도 테스트</h1>
      <p class="text-slate-200">6개의 질문으로 감정의 궤도를 별빛 타입으로 알아보세요. <a href="/" class="underline text-purple-200 hover:text-purple-100 transition">홈으로 돌아가기</a></p>
    </header>

    <main class="bg-white/10 border border-white/10 rounded-2xl shadow-2xl backdrop-blur-lg p-6 md:p-8 space-y-6">
      <section id="quiz" class="space-y-5">
        <div class="text-xs font-semibold text-purple-100 uppercase tracking-[0.3em]" id="stepLabel">문항 1 / 6</div>
        <h2 id="question" class="text-2xl font-semibold"></h2>
        <div id="options" class="space-y-3"></div>
        <div class="flex justify-between text-sm text-slate-300">
          <button id="prevBtn" class="px-3 py-2 rounded-lg border border-white/20 hover:border-white/40 hover:bg-white/10 transition disabled:opacity-40">이전</button>
          <span id="progress" class="text-purple-200">0% 완료</span>
        </div>
      </section>

      <section id="result" class="hidden space-y-4">
        <div class="text-xs font-semibold text-purple-100 uppercase tracking-[0.3em]">결과</div>
        <div class="flex flex-col md:flex-row gap-4">
          <div class="md:w-48 w-full">
            <img id="resultImage" class="rounded-2xl border border-white/20 shadow-lg w-full h-48 object-cover" alt="result">
          </div>
          <div class="flex-1 space-y-2">
            <h2 id="resultTitle" class="text-3xl font-bold"></h2>
            <div id="resultBadge" class="inline-flex items-center gap-2 px-3 py-2 rounded-full bg-white/10 border border-white/20 text-sm"></div>
            <p id="resultDesc" class="text-slate-100 leading-relaxed"></p>
          </div>
        </div>
        <div id="resultTips" class="space-y-2"></div>
        <button id="restartBtn" class="mt-2 inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-purple-500 text-white font-semibold shadow-lg hover:bg-purple-400 transition">다시 시작하기</button>
      </section>
    </main>
  </div>

  <script>
    const quiz = {
      questions: [
        {
          text: "오늘 감정을 빛에 비유하면?",
          options: [
            { label: "따뜻하고 안정적인 보랏빛", trait: "orbit" },
            { label: "폭죽처럼 번지는 불꽃", trait: "nova" },
            { label: "잔잔히 번지는 안개빛", trait: "nebula" },
            { label: "예측 불가의 꼬리를 그리는 혜성", trait: "comet" }
          ]
        },
        {
          text: "사람들과 있을 때 나는?",
          options: [
            { label: "모두의 속도를 맞추며 중심을 잡는다", trait: "orbit" },
            { label: "분위기를 순식간에 채우는 에너자이저", trait: "nova" },
            { label: "조용하지만 묘한 존재감을 남긴다", trait: "nebula" },
            { label: "필요할 때 나타나 강렬한 인상을 남긴다", trait: "comet" }
          ]
        },
        {
          text: "내 마음이 흔들릴 때 대처법은?",
          options: [
            { label: "규칙과 루틴을 지키며 안정감을 찾는다", trait: "orbit" },
            { label: "새로운 프로젝트로 감정을 환기한다", trait: "nova" },
            { label: "혼자만의 상상력으로 위로한다", trait: "nebula" },
            { label: "즉흥 여행이나 모험을 떠난다", trait: "comet" }
          ]
        },
        {
          text: "나를 가장 잘 설명하는 음악은?",
          options: [
            { label: "드라마틱한 오케스트라", trait: "nova" },
            { label: "몽환적인 신스 사운드", trait: "nebula" },
            { label: "리드미컬한 Lo-fi beats", trait: "orbit" },
            { label: "강렬한 기타 리프", trait: "comet" }
          ]
        },
        {
          text: "스트레스를 받을 때 찾는 장소는?",
          options: [
            { label: "집 근처 익숙한 산책로", trait: "orbit" },
            { label: "활기 넘치는 공연장", trait: "nova" },
            { label: "조용한 전망대나 오로라 사진 속", trait: "nebula" },
            { label: "새로운 도시나 미지의 길", trait: "comet" }
          ]
        },
        {
          text: "올해 꼭 해보고 싶은 일?",
          options: [
            { label: "꾸준한 루틴으로 자신만의 시스템 만들기", trait: "orbit" },
            { label: "사람들에게 영감 줄 작품 만들기", trait: "nova" },
            { label: "감성 기록 프로젝트 진행", trait: "nebula" },
            { label: "즉흥적인 로드트립", trait: "comet" }
          ]
        }
      ],
      traits: {
        orbit: {
          name: "궤도 지킴이",
          badge: "차분 · 안정",
          desc: "당신의 감정은 정해진 궤도를 따라 부드럽게 순환합니다. 주변에 안정감을 주는 존재예요.",
          image: "https://images.unsplash.com/photo-1470472304068-4398a9daab00?auto=format&fit=crop&w=900&q=80",
          tips: ["너무 규칙에 묶이지 말고 작은 변주를 주어보세요.", "루틴 속에서 감정 기록을 남겨보면 큰 도움이 됩니다."]
        },
        nova: {
          name: "노바 스파크",
          badge: "열정 · 폭발",
          desc: "감정의 불꽃이 강렬하게 터지는 타입. 주위를 밝히지만 에너지 관리가 중요합니다.",
          image: "https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=900&q=80",
          tips: ["폭발 전에 잠깐 멈춰 숨을 고르세요.", "당신의 창의성을 응원해 줄 사람들과 함께하세요."]
        },
        nebula: {
          name: "네뷸라 드리머",
          badge: "몽환 · 직감",
          desc: "감정이 안개처럼 서서히 퍼지는 타입입니다. 섬세한 직감으로 주변을 몰입시키죠.",
          image: "https://images.unsplash.com/photo-1470163395405-d2b80e7450ed?auto=format&fit=crop&w=900&q=80",
          tips: ["과도한 상상 대신 작은 실천으로 마음을 안정시켜보세요.", "감각을 깨우는 취미가 필요합니다."]
        },
        comet: {
          name: "코멧 러너",
          badge: "즉흥 · 모험",
          desc: "감정이 혜성처럼 예측 불가능하지만 강렬합니다. 순간 몰입력이 엄청난 타입이에요.",
          image: "https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=900&q=80&sat=-30",
          tips: ["무작정 달리기보다 기록을 남겨보세요.", "새로움과 휴식을 번갈아 주면 에너지를 오래 유지할 수 있어요."]
        }
      }
    };

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const stepLabel = document.getElementById("stepLabel");
    const progressEl = document.getElementById("progress");
    const resultCard = document.getElementById("result");
    const quizCard = document.getElementById("quiz");
    const resultTitle = document.getElementById("resultTitle");
    const resultBadge = document.getElementById("resultBadge");
    const resultDesc = document.getElementById("resultDesc");
    const resultImage = document.getElementById("resultImage");
    const resultTips = document.getElementById("resultTips");
    const restartBtn = document.getElementById("restartBtn");
    const prevBtn = document.getElementById("prevBtn");

    let current = 0;
    const answers = Array(quiz.questions.length).fill(null);

    function renderQuestion() {
      const q = quiz.questions[current];
      questionEl.textContent = q.text;
      stepLabel.textContent = `문항 ${current + 1} / ${quiz.questions.length}`;
      progressEl.textContent = `${Math.round((current / quiz.questions.length) * 100)}% 완료`;
      optionsEl.innerHTML = "";
      q.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "w-full text-left px-4 py-3 rounded-xl border border-white/20 hover:border-purple-200 hover:bg-white/10 transition";
        btn.textContent = opt.label;
        btn.addEventListener("click", () => handleOption(opt.trait));
        optionsEl.appendChild(btn);
      });
      prevBtn.disabled = current === 0;
    }

    function handleOption(trait) {
      answers[current] = trait;
      if (current === quiz.questions.length - 1) {
        showResult();
        return;
      }
      current += 1;
      renderQuestion();
    }

    function showResult() {
      const tally = answers.reduce((map, trait) => {
        if (!trait) return map;
        map[trait] = (map[trait] || 0) + 1;
        return map;
      }, {});
      let winner = null;
      Object.keys(tally).forEach(trait => {
        if (!winner || tally[trait] > tally[winner]) winner = trait;
      });
      if (!winner) {
        resultTitle.textContent = "아직 결과가 없어요";
        resultDesc.textContent = "문항을 모두 선택하면 결과를 확인할 수 있어요.";
        return;
      }
      const meta = quiz.traits[winner];
      resultTitle.textContent = meta.name;
      resultBadge.textContent = meta.badge;
      resultDesc.textContent = meta.desc;
      resultImage.src = meta.image;
      resultImage.alt = meta.name;
      resultTips.innerHTML = "";
      meta.tips.forEach(t => {
        const item = document.createElement("div");
        item.className = "border border-white/15 rounded-xl px-3 py-2 text-sm text-slate-100";
        item.textContent = `• ${t}`;
        resultTips.appendChild(item);
      });
      quizCard.classList.add("hidden");
      resultCard.classList.remove("hidden");
      progressEl.textContent = "100% 완료";
    }

    function goPrev() {
      if (current === 0) return;
      current -= 1;
      renderQuestion();
    }

    function restart() {
      for (let i = 0; i < answers.length; i += 1) answers[i] = null;
      current = 0;
      quizCard.classList.remove("hidden");
      resultCard.classList.add("hidden");
      progressEl.textContent = "0% 완료";
      renderQuestion();
    }

    prevBtn.addEventListener("click", goPrev);
    restartBtn.addEventListener("click", restart);

    renderQuestion();
  </script>
</body>
</html>
