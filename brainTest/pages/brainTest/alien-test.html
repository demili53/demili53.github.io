<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="6개의 질문으로 내가 어떤 외계인 타입인지 알아보는 심리 테스트">
  <meta name="keywords" content="외계인 테스트, 타입 테스트, 성격 테스트, alien test">
  <meta name="google-adsense-account" content="ca-pub-1087435977438565">
  <meta name="author" content="partygame.pe.kr">
  <link rel="canonical" href="https://partygame.pe.kr/brainTest/pages/brainTest/alien-test.html">
  <meta property="og:type" content="article">
  <meta property="og:title" content="나만의 외계인 테스트">
  <meta property="og:description" content="6개의 질문으로 내가 어떤 외계인인지 알아보기">
  <meta property="og:image" content="https://images.unsplash.com/photo-1446776653964-20c1d3a81b06?auto=format&fit=crop&w=900&q=80">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1087435977438565"
          crossorigin="anonymous"></script>
  <script>
    window.adsbygoogle = window.adsbygoogle || [];
    if (!window.__AD_SENSE_INITIALIZED__) {
      window.adsbygoogle.push({
        google_ad_client: "ca-pub-1087435977438565",
        enable_page_level_ads: true
      });
      window.__AD_SENSE_INITIALIZED__ = true;
    }
  </script>
  <title>나만의 외계인 테스트</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-indigo-950 via-slate-900 to-black text-slate-50">
  <div class="max-w-4xl mx-auto px-6 py-12 space-y-8">
    <header class="text-center space-y-3">
      <p class="uppercase text-xs tracking-[0.3em] text-teal-200">Alien Type Test</p>
      <h1 class="text-3xl md:text-4xl font-extrabold">나만의 외계인 테스트</h1>
      <p class="text-slate-200">6개의 질문으로 내가 어떤 외계인 타입인지 알아보는 심리 테스트입니다. <a href="/" class="underline text-teal-200 hover:text-teal-100 transition">홈으로 돌아가기</a></p>
    </header>

    <main class="bg-white/10 border border-white/10 rounded-2xl shadow-2xl backdrop-blur-lg p-6 md:p-8 space-y-6">
      <section id="quiz" class="space-y-5">
        <div class="text-xs font-semibold text-teal-100 uppercase tracking-[0.3em]" id="stepLabel">문항 1 / 6</div>
        <h2 id="question" class="text-2xl font-semibold"></h2>
        <div id="options" class="space-y-3"></div>
        <div class="flex justify-between text-sm text-slate-400">
          <button id="prevBtn" class="px-3 py-2 rounded-lg border border-white/20 hover:border-white/40 hover:bg-white/10 transition disabled:opacity-40">이전</button>
          <span id="progress" class="text-teal-200">0% 완료</span>
        </div>
      </section>

      <section id="result" class="hidden space-y-4">
        <div class="text-xs font-semibold text-teal-100 uppercase tracking-[0.3em]">결과</div>
        <div class="flex flex-col md:flex-row gap-4">
          <div class="md:w-48 w-full">
            <img id="resultImage" class="rounded-2xl border border-white/20 shadow-lg w-full h-48 object-cover" alt="result">
          </div>
          <div class="flex-1 space-y-2">
            <h2 id="resultTitle" class="text-3xl font-bold"></h2>
            <div id="resultBadge" class="inline-flex items-center gap-2 px-3 py-2 rounded-full bg-white/10 border border-white/20 text-sm"></div>
            <p id="resultDesc" class="text-slate-100 leading-relaxed"></p>
          </div>
        </div>
        <div id="resultTips" class="space-y-2"></div>
        <div class="flex flex-wrap gap-3">
          <button id="shareKakaoBtn" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-teal-300 text-teal-100 hover:bg-teal-400/10 transition">카카오톡 공유</button>
          <button id="restartBtn" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-teal-500 text-white font-semibold shadow-lg hover:bg-teal-400 transition">다시 시작하기</button>
        </div>
      </section>
    </main>
  </div>

  <script src="https://developers.kakao.com/sdk/js/kakao.min.js" crossorigin="anonymous"></script>
  <script src="/brainTest/scripts/kakao-share.js"></script>
  <script>
    const quiz = {
      questions: [
        {
          text: "지구에 온 목적은 무엇인가요?",
          options: [
            { label: "인류와 공존하며 지식을 나누기 위해", trait: "guardian" },
            { label: "새로운 감정을 탐험하기 위해", trait: "empath" },
            { label: "기술과 에너지를 수집하기 위해", trait: "engineer" },
            { label: "자연을 회복시키기 위해", trait: "healer" }
          ]
        },
        {
          text: "발견한 지구인의 첫인상은?",
          options: [
            { label: "서로를 지키려는 따뜻함이 보인다", trait: "guardian" },
            { label: "감정의 파도가 너무 매력적이다", trait: "empath" },
            { label: "도구를 다루는 창의력이 놀랍다", trait: "engineer" },
            { label: "자연과 함께 살 노력은 더 필요", trait: "healer" }
          ]
        },
        {
          text: "지구에서 지내고 싶은 곳은?",
          options: [
            { label: "사람들이 많은 도시 한가운데", trait: "empath" },
            { label: "연구소와 실험실이 많은 곳", trait: "engineer" },
            { label: "숲과 바다가 있는 힐링 공간", trait: "healer" },
            { label: "사람들이 필요로 하는 현장", trait: "guardian" }
          ]
        },
        {
          text: "당신의 우주선에는 어떤 장치가 있나요?",
          options: [
            { label: "감정을 읽는 공명 장치", trait: "empath" },
            { label: "시간을 절약하는 텔레포트 코어", trait: "engineer" },
            { label: "생명 에너지 회복 장비", trait: "healer" },
            { label: "방어막과 안전 시스템", trait: "guardian" }
          ]
        },
        {
          text: "지구인과 친구가 된다면 가장 먼저?",
          options: [
            { label: "이야기를 충분히 들어준다", trait: "empath" },
            { label: "기술과 정보를 나눈다", trait: "engineer" },
            { label: "치유 에너지로 지친 마음을 돌본다", trait: "healer" },
            { label: "위험으로부터 보호한다", trait: "guardian" }
          ]
        },
        {
          text: "당신 행성의 규칙 중 하나를 지구에 들여온다면?",
          options: [
            { label: "모든 생명의 감정을 존중해야 한다", trait: "empath" },
            { label: "발전은 모두의 안전을 우선한다", trait: "guardian" },
            { label: "자원의 순환과 균형을 지켜야 한다", trait: "healer" },
            { label: "지식은 공유될수록 커진다", trait: "engineer" }
          ]
        }
      ],
      traits: {
        guardian: {
          name: "가디언 외계인",
          badge: "평화 수호자",
          desc: "당신은 위기 상황에서 본능적으로 사람들을 보호하려는 수호자형 외계인입니다. 안정감과 리더십이 매력 포인트!",
          image: "https://images.unsplash.com/photo-1446776653964-20c1d3a81b06?auto=format&fit=crop&w=900&q=80",
          tips: ["과한 책임감을 내려놓고 나를 돌보는 시간도 필요해요.", "함께 움직일 동료를 찾으면 더 큰 에너지를 발휘합니다."]
        },
        empath: {
          name: "엠패스 외계인",
          badge: "감정 탐험가",
          desc: "어떤 감정도 이해하고 공감하는 능력이 탁월한 공감형 외계인입니다. 분위기 메이커이자 힐러 역할을 잘해요.",
          image: "https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=900&q=80",
          tips: ["감정을 너무 많이 끌어안지 마세요.", "당신을 이해해줄 사람에게도 기대보세요."]
        },
        engineer: {
          name: "엔지니어 외계인",
          badge: "기술 창조자",
          desc: "새로운 기술과 도구를 만들며 진화하는 혁신형 외계인입니다. 문제를 해결하고 미래를 여는 데 강점을 지녔어요.",
          image: "https://images.unsplash.com/photo-1470163395405-d2b80e7450ed?auto=format&fit=crop&w=900&q=80",
          tips: ["생각을 세상 밖으로 꺼내 공유하세요.", "머릿속 설계도를 실험하며 즐겨보세요."]
        },
        healer: {
          name: "힐러 외계인",
          badge: "생명 에너지 조율자",
          desc: "자연과 생명 에너지를 다루는 치유형 외계인입니다. 균형과 회복을 중시하며 편안한 기운을 전파하죠.",
          image: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=900&q=80",
          tips: ["당신도 재충전이 필요합니다.", "감각을 깨우는 취미를 찾아서 기운을 채워보세요."]
        }
      }
    };

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const stepLabel = document.getElementById("stepLabel");
    const progressEl = document.getElementById("progress");
    const resultCard = document.getElementById("result");
    const quizCard = document.getElementById("quiz");
    const resultTitle = document.getElementById("resultTitle");
    const resultBadge = document.getElementById("resultBadge");
    const resultDesc = document.getElementById("resultDesc");
    const resultImage = document.getElementById("resultImage");
    const resultTips = document.getElementById("resultTips");
    const restartBtn = document.getElementById("restartBtn");
    const prevBtn = document.getElementById("prevBtn");

    let current = 0;
    const answers = Array(quiz.questions.length).fill(null);

    function renderQuestion() {
      const q = quiz.questions[current];
      questionEl.textContent = q.text;
      stepLabel.textContent = `문항 ${current + 1} / ${quiz.questions.length}`;
      progressEl.textContent = `${Math.round((current / quiz.questions.length) * 100)}% 완료`;
      optionsEl.innerHTML = "";

      q.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "w-full text-left px-4 py-3 rounded-xl border border-white/20 hover:border-teal-200 hover:bg-white/10 transition";
        btn.textContent = opt.label;
        btn.addEventListener("click", () => handleOption(opt.trait));
        optionsEl.appendChild(btn);
      });

      prevBtn.disabled = current === 0;
    }

    function handleOption(trait) {
      answers[current] = trait;
      if (current === quiz.questions.length - 1) {
        showResult();
        return;
      }
      current += 1;
      renderQuestion();
    }

    function showResult() {
      const count = answers.reduce((map, trait) => {
        if (!trait) return map;
        map[trait] = (map[trait] || 0) + 1;
        return map;
      }, {});

      let winner = null;
      Object.keys(count).forEach(trait => {
        if (!winner || count[trait] > count[winner]) winner = trait;
      });

      if (!winner) {
        resultTitle.textContent = "아직 결과가 없어요";
        resultDesc.textContent = "모든 문항을 선택한 뒤 다시 확인해 주세요.";
        return;
      }

      const meta = quiz.traits[winner];
      resultTitle.textContent = meta.name;
      resultBadge.textContent = meta.badge;
      resultDesc.textContent = meta.desc;
      resultImage.src = meta.image;
      resultImage.alt = meta.name;
      resultTips.innerHTML = "";
      meta.tips.forEach(t => {
        const item = document.createElement("div");
        item.className = "border border-white/15 rounded-xl px-3 py-2 text-sm text-slate-100";
        item.textContent = `• ${t}`;
        resultTips.appendChild(item);
      });

      quizCard.classList.add("hidden");
      resultCard.classList.remove("hidden");
      progressEl.textContent = "100% 완료";
    }

    function goPrev() {
      if (current === 0) return;
      current -= 1;
      renderQuestion();
    }

    function restart() {
      for (let i = 0; i < answers.length; i += 1) answers[i] = null;
      current = 0;
      quizCard.classList.remove("hidden");
      resultCard.classList.add("hidden");
      progressEl.textContent = "0% 완료";
      renderQuestion();
    }

    prevBtn.addEventListener("click", goPrev);
    restartBtn.addEventListener("click", restart);

    renderQuestion();

    setupKakaoShare("shareKakaoBtn", {
      title: "나만의 외계인 테스트",
      description: "6개의 질문으로 내가 어떤 외계인 타입인지 알아보는 심리 테스트",
      imageUrl: "https://images.unsplash.com/photo-1446776653964-20c1d3a81b06?auto=format&fit=crop&w=900&q=80",
      webUrl: "https://partygame.pe.kr/brainTest/pages/brainTest/alien-test.html"
    });
  </script>
</body>
</html>
