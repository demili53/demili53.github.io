<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="6개의 질문으로 내가 어떤 백룸 생존 유형인지 알아보는 테스트">
  <meta name="keywords" content="백룸 탈출, 백룸 테스트, backrooms test, 생존 유형">
  <meta name="google-adsense-account" content="ca-pub-1087435977438565">
  <meta name="author" content="partygame.pe.kr">
  <link rel="canonical" href="https://partygame.pe.kr/brainTest/pages/brainTest/backrooms-survival-test.html">
  <meta property="og:type" content="article">
  <meta property="og:title" content="백룸 생존 유형 테스트">
  <meta property="og:description" content="백룸 탈출 시나리오로 내 생존 유형을 알아보는 6문항 테스트">
  <meta property="og:image" content="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=900&q=80">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1087435977438565"
          crossorigin="anonymous"></script>
  <script>
    window.adsbygoogle = window.adsbygoogle || [];
    if (!window.__AD_SENSE_INITIALIZED__) {
      window.adsbygoogle.push({
        google_ad_client: "ca-pub-1087435977438565",
        enable_page_level_ads: true
      });
      window.__AD_SENSE_INITIALIZED__ = true;
    }
  </script>
  <title>백룸 생존 유형 테스트</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-yellow-900 via-amber-900 to-black text-slate-50">
  <div class="max-w-4xl mx-auto px-6 py-12 space-y-8">
    <header class="text-center space-y-3">
      <p class="uppercase text-xs tracking-[0.3em] text-yellow-200">Backrooms Survival</p>
      <h1 class="text-3xl md:text-4xl font-extrabold">백룸 생존 유형 테스트</h1>
      <p class="text-slate-200">6개의 질문으로 내가 어떤 백룸 생존 전략을 가진 타입인지 알아보세요. <a href="/" class="underline text-yellow-200 hover:text-yellow-100 transition">홈으로 돌아가기</a></p>
    </header>

    <main class="bg-white/10 border border-white/10 rounded-2xl shadow-2xl backdrop-blur-lg p-6 md:p-8 space-y-6">
      <section id="quiz" class="space-y-5">
        <div class="text-xs font-semibold text-yellow-100 uppercase tracking-[0.3em]" id="stepLabel">문항 1 / 6</div>
        <h2 id="question" class="text-2xl font-semibold"></h2>
        <div id="options" class="space-y-3"></div>
        <div class="flex justify-between text-sm text-slate-400">
          <button id="prevBtn" class="px-3 py-2 rounded-lg border border-white/20 hover:border-white/40 hover:bg-white/10 transition disabled:opacity-40">이전</button>
          <span id="progress" class="text-yellow-200">0% 완료</span>
        </div>
      </section>

      <section id="result" class="hidden space-y-4">
        <div class="text-xs font-semibold text-yellow-100 uppercase tracking-[0.3em]">결과</div>
        <div class="flex flex-col md:flex-row gap-4">
          <div class="md:w-48 w-full">
            <img id="resultImage" class="rounded-2xl border border-white/20 shadow-lg w-full h-48 object-cover" alt="result">
          </div>
          <div class="flex-1 space-y-2">
            <h2 id="resultTitle" class="text-3xl font-bold"></h2>
            <div id="resultBadge" class="inline-flex items-center gap-2 px-3 py-2 rounded-full bg-white/10 border border-white/20 text-sm"></div>
            <p id="resultDesc" class="text-slate-100 leading-relaxed"></p>
          </div>
        </div>
        <div id="resultTips" class="space-y-2"></div>
        <div class="flex flex-wrap gap-3">
          <button id="shareKakaoBtn" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-amber-300 text-amber-100 hover:bg-amber-400/10 transition">카카오톡 공유</button>
          <button id="restartBtn" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-yellow-500 text-white font-semibold shadow-lg hover:bg-yellow-400 transition">다시 시작하기</button>
        </div>
      </section>
    </main>
  </div>

  <script src="https://developers.kakao.com/sdk/js/kakao.min.js" crossorigin="anonymous"></script>
  <script src="/brainTest/scripts/kakao-share.js"></script>
  <script>
    const quiz = {
      questions: [
        {
          text: "백룸에 떨어진 첫 순간, 나는?",
          options: [
            { label: "지도를 그리며 구조적으로 파악한다", trait: "planner" },
            { label: "주변 소리와 기류를 느끼며 감각을 집중한다", trait: "sensor" },
            { label: "출구를 찾기 위해 빠르게 움직인다", trait: "sprinter" },
            { label: "기다리며 다른 생존자를 관찰한다", trait: "observer" }
          ]
        },
        {
          text: "낯선 복도에서 누군가의 발소리가 들린다",
          options: [
            { label: "숨고 상황을 기록한다", trait: "observer" },
            { label: "음향 덫인 것 같아 다른 길을 찾는다", trait: "sensor" },
            { label: "쫓기 전에 속도를 높인다", trait: "sprinter" },
            { label: "발소리 방향을 추적해 구조 여부를 확인한다", trait: "planner" }
          ]
        },
        {
          text: "조명이 깜빡일 때 나는?",
          options: [
            { label: "전력 흐름을 판단해 안전한 구간을 찾는다", trait: "planner" },
            { label: "빛의 리듬을 감지해 패턴을 분석한다", trait: "sensor" },
            { label: "어둠이 오기 전에 빠르게 이동한다", trait: "sprinter" },
            { label: "잠시 멈춰 적응하며 다음 행동을 준비한다", trait: "observer" }
          ]
        },
        {
          text: "아이템 하나를 챙길 수 있다면?",
          options: [
            { label: "지도와 펜", trait: "planner" },
            { label: "소리를 감지하는 헤드셋", trait: "sensor" },
            { label: "체력 회복용 에너지 바", trait: "sprinter" },
            { label: "시야를 넓혀주는 야시경", trait: "observer" }
          ]
        },
        {
          text: "동료와 함께라면 나는 어떤 역할?",
          options: [
            { label: "경로 설계와 전략 담당", trait: "planner" },
            { label: "위험 감지와 감시 담당", trait: "sensor" },
            { label: "미끼나 유인 역할도 감수", trait: "sprinter" },
            { label: "기록과 정보 공유", trait: "observer" }
          ]
        },
        {
          text: "마지막으로 탈출 문이 보였다!",
          options: [
            { label: "정확한 절차를 확인하고 문을 연다", trait: "planner" },
            { label: "문 뒤 소리를 듣고 이상 여부를 확인한다", trait: "sensor" },
            { label: "망설임 없이 돌파한다", trait: "sprinter" },
            { label: "한 번 더 주변을 살피고 움직인다", trait: "observer" }
          ]
        }
      ],
      traits: {
        planner: {
          name: "매뉴얼 설계자",
          badge: "치밀 · 계산형",
          desc: "위험을 구조적으로 분석하며 생존 루트를 설계하는 타입입니다. 기록과 계획이 생존의 핵심 무기입니다.",
          image: "https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=900&q=80",
          tips: ["계획을 세우되 유연함을 잊지 마세요.", "동료가 있다면 역할 분담을 시도해 보세요."]
        },
        sensor: {
          name: "감각 추적자",
          badge: "예민 · 직감형",
          desc: "소리, 빛, 공기의 흐름을 감지해 위험을 회피하는 직감형 생존자입니다. 순간 판단력이 뛰어납니다.",
          image: "https://images.unsplash.com/photo-1470163395405-d2b80e7450ed?auto=format&fit=crop&w=900&q=80",
          tips: ["감각 과부하를 피하려면 휴식 시간을 확보하세요.", "정확한 감각 기록이 다음 생존을 돕습니다."]
        },
        sprinter: {
          name: "돌파 러너",
          badge: "속도 · 실행형",
          desc: "위험을 직감하면 곧바로 돌파하는 실행형 생존자입니다. 체력과 속도가 큰 장점입니다.",
          image: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=900&q=80",
          tips: ["지구력을 키우고 호흡을 조절해 보세요.", "돌파 후 상황을 기록하면 다음에 도움이 됩니다."]
        },
        observer: {
          name: "잠복 관찰자",
          badge: "분석 · 관망형",
          desc: "위험을 직접 보기 전까지 판단을 미루며 정보를 수집하는 타입입니다. 침착함이 가장 큰 장점입니다.",
          image: "https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=900&q=80",
          tips: ["필요할 때는 과감히 움직여야 기회를 잡을 수 있어요.", "관찰 내용을 기록해 팀과 공유하면 더 빛납니다."]
        }
      }
    };

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const stepLabel = document.getElementById("stepLabel");
    const progressEl = document.getElementById("progress");
    const resultCard = document.getElementById("result");
    const quizCard = document.getElementById("quiz");
    const resultTitle = document.getElementById("resultTitle");
    const resultBadge = document.getElementById("resultBadge");
    const resultDesc = document.getElementById("resultDesc");
    const resultImage = document.getElementById("resultImage");
    const resultTips = document.getElementById("resultTips");
    const restartBtn = document.getElementById("restartBtn");
    const prevBtn = document.getElementById("prevBtn");

    let current = 0;
    const answers = Array(quiz.questions.length).fill(null);

    function renderQuestion() {
      const q = quiz.questions[current];
      questionEl.textContent = q.text;
      stepLabel.textContent = `문항 ${current + 1} / ${quiz.questions.length}`;
      progressEl.textContent = `${Math.round((current / quiz.questions.length) * 100)}% 완료`;
      optionsEl.innerHTML = "";
      q.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "w-full text-left px-4 py-3 rounded-xl border border-white/20 hover:border-yellow-200 hover:bg-white/10 transition";
        btn.textContent = opt.label;
        btn.addEventListener("click", () => handleOption(opt.trait));
        optionsEl.appendChild(btn);
      });
      prevBtn.disabled = current === 0;
    }

    function handleOption(trait) {
      answers[current] = trait;
      if (current === quiz.questions.length - 1) {
        showResult();
        return;
      }
      current += 1;
      renderQuestion();
    }

    function showResult() {
      const tally = answers.reduce((map, trait) => {
        if (!trait) return map;
        map[trait] = (map[trait] || 0) + 1;
        return map;
      }, {});
      let winner = null;
      Object.keys(tally).forEach(trait => {
        if (!winner || tally[trait] > tally[winner]) winner = trait;
      });
      if (!winner) {
        resultTitle.textContent = "아직 결과가 없어요";
        resultDesc.textContent = "모든 문항을 선택하면 결과를 확인할 수 있어요.";
        return;
      }
      const meta = quiz.traits[winner];
      resultTitle.textContent = meta.name;
      resultBadge.textContent = meta.badge;
      resultDesc.textContent = meta.desc;
      resultImage.src = meta.image;
      resultImage.alt = meta.name;
      resultTips.innerHTML = "";
      meta.tips.forEach(t => {
        const item = document.createElement("div");
        item.className = "border border-white/15 rounded-xl px-3 py-2 text-sm text-slate-100";
        item.textContent = `• ${t}`;
        resultTips.appendChild(item);
      });
      quizCard.classList.add("hidden");
      resultCard.classList.remove("hidden");
      progressEl.textContent = "100% 완료";
    }

    function goPrev() {
      if (current === 0) return;
      current -= 1;
      renderQuestion();
    }

    function restart() {
      for (let i = 0; i < answers.length; i += 1) answers[i] = null;
      current = 0;
      quizCard.classList.remove("hidden");
      resultCard.classList.add("hidden");
      progressEl.textContent = "0% 완료";
      renderQuestion();
    }

    prevBtn.addEventListener("click", goPrev);
    restartBtn.addEventListener("click", restart);

    renderQuestion();

    setupKakaoShare("shareKakaoBtn", {
      title: "백룸 생존 유형 테스트",
      description: "6개의 질문으로 내가 어떤 백룸 생존 유형인지 알아보는 테스트",
      imageUrl: "https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=900&q=80",
      webUrl: "https://partygame.pe.kr/brainTest/pages/brainTest/backrooms-survival-test.html"
    });
  </script>
</body>
</html>
