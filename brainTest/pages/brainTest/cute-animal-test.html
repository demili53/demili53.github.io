<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="8개의 질문으로 내가 어떤 귀여운 동물인지 알아보는 하찮음 테스트">
  <meta name="keywords" content="하찮은 동물 테스트, 귀여운 동물, animal mood, 심리 테스트">
  <meta name="google-adsense-account" content="ca-pub-1087435977438565">
  <meta name="author" content="partygame.pe.kr">
  <link rel="canonical" href="https://partygame.pe.kr/brainTest/pages/brainTest/cute-animal-test.html">
  <meta property="og:type" content="article">
  <meta property="og:title" content="하찮은 동물 테스트">
  <meta property="og:description" content="내 안에 숨은 귀엽고 하찮은 동물 타입을 찾아보는 테스트">
  <meta property="og:image" content="https://pixabay.com/get/ga65fff30347abb73380b855ac93c08136c8022e760128d4d31f6d3d8ba41d1396b5624b3df244b25f251c264bcc7969b938afa217f6787135fe2edf0089c6c58_1280.jpg">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1087435977438565"
         ></script>
  <title>하찮은 동물 테스트</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-indigo-950 via-slate-900 to-black text-slate-50">
  <div class="max-w-4xl mx-auto px-6 py-12 space-y-8">
    <header class="text-center space-y-3">
      <p class="uppercase text-xs tracking-[0.3em] text-yellow-200">Cute Animal Mood</p>
      <h1 class="text-3xl md:text-4xl font-extrabold">하찮은 동물 테스트</h1>
      <p class="text-slate-200">8개의 질문으로 내가 어떤 귀엽고 하찮은 동물인지 알아보세요. <a href="/" class="underline text-yellow-200 hover:text-yellow-100 transition">홈으로 돌아가기</a></p>
    </header>

    <main class="bg-white/10 border border-white/10 rounded-2xl shadow-2xl backdrop-blur-lg p-6 md:p-8 space-y-6">
      <section id="quiz" class="space-y-5">
        <div class="text-xs font-semibold text-yellow-100 uppercase tracking-[0.3em]" id="stepLabel">문항 1 / 8</div>
        <h2 id="question" class="text-2xl font-semibold"></h2>
        <div id="options" class="space-y-3"></div>
        <div class="flex justify-between text-sm text-slate-300">
          <button id="prevBtn" class="px-3 py-2 rounded-lg border border-white/20 hover:border-white/40 hover:bg-white/10 transition disabled:opacity-40">이전</button>
          <span id="progress" class="text-yellow-200">0% 완료</span>
        </div>
      </section>

      <section id="result" class="hidden space-y-4">
        <div class="text-xs font-semibold text-yellow-100 uppercase tracking-[0.3em]">결과</div>
        <div class="flex flex-col md:flex-row gap-4">
          <div class="md:w-48 w-full">
            <img id="resultImage" class="rounded-2xl border border-white/20 shadow-lg w-full h-48 object-cover" alt="result">
          </div>
          <div class="flex-1 space-y-2">
            <h2 id="resultTitle" class="text-3xl font-bold"></h2>
            <div id="resultBadge" class="inline-flex items-center gap-2 px-3 py-2 rounded-full bg-white/10 border border-white/20 text-sm"></div>
            <p id="resultDesc" class="text-slate-100 leading-relaxed"></p>
          </div>
        </div>
        <div id="resultTips" class="space-y-2"></div>
        <div class="flex flex-wrap gap-3">
          <button id="shareKakaoBtn" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-yellow-300 text-yellow-100 hover:bg-yellow-400/10 transition">카카오톡 공유</button>
          <button id="restartBtn" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-yellow-500 text-white font-semibold shadow-lg hover:bg-yellow-400 transition">다시 시작하기</button>
          <a href="/" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-white/20 text-slate-100 hover:bg-white/10 transition">홈으로 이동</a>
        </div>
      </section>
    </main>
  </div>

  <script src="https://developers.kakao.com/sdk/js/kakao.min.js"></script>
  <script>
    window.__KAKAO_APP_KEY__ = "af0f520240f2c824b721bbd002c45178";
    if (window.Kakao && !window.Kakao.isInitialized()) {
      window.Kakao.init(window.__KAKAO_APP_KEY__);
    }
  </script>
  <script src="/brainTest/scripts/kakao-share.js"></script>
  <script>
    const quiz = {
      questions: [
        {
          text: "아침에 눈 뜨면 가장 먼저 떠오르는 생각은?",
          options: [
            { label: "조금만 더 잘래...", trait: "lazy" },
            { label: "오늘은 뭘 먹을까?", trait: "foodie" },
            { label: "새로운 재미거리 없나?", trait: "curious" },
            { label: "사람들 안 만나도 괜찮겠지?", trait: "intro" }
          ]
        },
        {
          text: "지금 마음의 상태를 색으로 표현하면?",
          options: [
            { label: "따뜻한 파스텔", trait: "lazy" },
            { label: "오렌지빛 에너지", trait: "foodie" },
            { label: "형광색 번쩍", trait: "curious" },
            { label: "그라데이션 모노톤", trait: "intro" }
          ]
        },
        {
          text: "주말에 가장 하고 싶은 일은?",
          options: [
            { label: "이불과 애착템과 함께 뒹굴기", trait: "lazy" },
            { label: "맛집 탐방과 디저트 투어", trait: "foodie" },
            { label: "미지의 동네 탐험", trait: "curious" },
            { label: "집콕하면서 영상 몰아보기", trait: "intro" }
          ]
        },
        {
          text: "친구들이 말하는 내 장점은?",
          options: [
            { label: "편안하고 포근하다", trait: "lazy" },
            { label: "언제나 재미있는 걸 찾는다", trait: "curious" },
            { label: "먹을거 추천이 탁월하다", trait: "foodie" },
            { label: "생각이 깊고 섬세하다", trait: "intro" }
          ]
        },
        {
          text: "감정이 복잡할 때 나만의 대처법은?",
          options: [
            { label: "잠과 휴식으로 버티기", trait: "lazy" },
            { label: "맛있는 것 챙겨 먹고 기분 전환", trait: "foodie" },
            { label: "새로운 취미를 파고든다", trait: "curious" },
            { label: "글쓰기나 음악 감상", trait: "intro" }
          ]
        },
        {
          text: "내가 생각하는 하찮음의 매력은?",
          options: [
            { label: "해탈해서 여유로운 느낌", trait: "lazy" },
            { label: "먹고 노는 데 진심인 모습", trait: "foodie" },
            { label: "뭔가 늘 새로운 걸 찾는 끼", trait: "curious" },
            { label: "자기만의 세계를 지키는 당당함", trait: "intro" }
          ]
        },
        {
          text: "친구들과 여행을 간다면?",
          options: [
            { label: "숙소가 제일 중요! 푹 쉬어야지", trait: "lazy" },
            { label: "먹거리와 콘텐츠 계획부터", trait: "foodie" },
            { label: "현지 체험을 빠르게 탐색", trait: "curious" },
            { label: "일행과 떨어져 한두 시간 혼자 걷기도", trait: "intro" }
          ]
        },
        {
          text: "마지막으로 하고 싶은 한마디는?",
          options: [
            { label: "하찮아도 행복하면 된 거지!", trait: "lazy" },
            { label: "밥은 먹고 다니자", trait: "foodie" },
            { label: "오늘도 새로운 발견하자", trait: "curious" },
            { label: "내 페이스로 살아볼래", trait: "intro" }
          ]
        }
      ],
      traits: {
        lazy: {
          name: "잠꾸러기 판다",
          badge: "기본값 : 여유",
          desc: "당신은 세상의 속도에 맞추기보다 자신만의 리듬을 가치 있게 여기는 판다 타입! 자고 먹고 쉬며 힐링을 선사합니다.",
          image: "https://pixabay.com/get/gad815e3f205411e83181859070245ca506261b0e9c7195e49fa8649a89bda35c16bf5231c189711e45e7106a0f4705de3daf3e5001ae429e5fc870aeb7b0528c_1280.jpg",
          tips: ["가끔은 몸도 마음도 스트레칭해 주세요.", "원할 때만 움직여도 충분히 귀여워요."]
        },
        foodie: {
          name: "간식요정 다람쥐",
          badge: "기본값 : 맛있음",
          desc: "무엇보다 맛있는 행복을 좇는 타입! 주변 사람들을 먹을거리로 웃게 만드는 귀여운 다람쥐입니다.",
          image: "https://pixabay.com/get/gd50e72041ddd34de06c1e0f1c2162bdfdfc51d47629a393d2b52083aa39bba8cada1f53aa6fe35b191f8944ea4da598abfa7c93b419b4ca36871adce073456a5_1280.jpg",
          tips: ["몸이 원하는 영양 밸런스를 챙겨보세요.", "맛의 기록을 남기면 또 다른 재미가 생깁니다."]
        },
        curious: {
          name: "모험가 미어캣",
          badge: "기본값 : 호기심",
          desc: "새로운 사람/장소/콘텐츠에 끌리는 타입. 탐험과 발견이 곧 당신의 하찮은(?) 매력이에요.",
          image: "https://pixabay.com/get/ge49b44742503578f73b0d0a10124b6bb9c361adebd103830617a5a7ff26e2aaea126ea9ec5a934e9179edf48bca592b0e0f010fe993f194d0efdeba9a0954466_1280.jpg",
          tips: ["휴식도 계획해 두면 에너지를 오래 유지합니다.", "발견한 즐거움을 주변과 나눠보세요."]
        },
        intro: {
          name: "혼자놀기 장인 수달",
          badge: "기본값 : 몰입",
          desc: "조용한 취향을 즐기면서도 귀여움을 숨길 수 없는 타입. 자신만의 세계에서 에너지를 채웁니다.",
          image: "https://pixabay.com/get/g3363f803fabf805cccdc015667d755ac5f9d5791f65d426371643af84058b8f7cfdd7b6b15b33b842110cbdcafeeaa9ad658b6fc7165a7c7931a10dcc3b8df0a_1280.jpg",
          tips: ["타인의 기대보다 본인 페이스를 존중하세요.", "가끔은 친구에게 안부를 전하면 좋습니다."]
        }
      }
    };

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const stepLabel = document.getElementById("stepLabel");
    const progressEl = document.getElementById("progress");
    const resultCard = document.getElementById("result");
    const quizCard = document.getElementById("quiz");
    const resultTitle = document.getElementById("resultTitle");
    const resultBadge = document.getElementById("resultBadge");
    const resultDesc = document.getElementById("resultDesc");
    const resultImage = document.getElementById("resultImage");
    const resultTips = document.getElementById("resultTips");
    const restartBtn = document.getElementById("restartBtn");
    const prevBtn = document.getElementById("prevBtn");

    let current = 0;
    const answers = Array(quiz.questions.length).fill(null);

    function renderQuestion() {
      const q = quiz.questions[current];
      questionEl.textContent = q.text;
      stepLabel.textContent = `문항 ${current + 1} / ${quiz.questions.length}`;
      progressEl.textContent = `${Math.round((current / quiz.questions.length) * 100)}% 완료`;
      optionsEl.innerHTML = "";
      q.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "w-full text-left px-4 py-3 rounded-xl border border-white/20 hover:border-yellow-200 hover:bg-white/10 transition";
        btn.textContent = opt.label;
        btn.addEventListener("click", () => handleOption(opt.trait));
        optionsEl.appendChild(btn);
      });
      prevBtn.disabled = current === 0;
    }

    function handleOption(trait) {
      answers[current] = trait;
      if (current === quiz.questions.length - 1) {
        showResult();
        return;
      }
      current += 1;
      renderQuestion();
    }

    function showResult() {
      const tally = answers.reduce((map, trait) => {
        if (!trait) return map;
        map[trait] = (map[trait] || 0) + 1;
        return map;
      }, {});
      let winner = null;
      Object.keys(tally).forEach(trait => {
        if (!winner || tally[trait] > tally[winner]) winner = trait;
      });
      if (!winner) {
        resultTitle.textContent = "아직 결과가 없어요";
        resultDesc.textContent = "문항을 모두 선택하면 결과를 확인할 수 있어요.";
        return;
      }
      const meta = quiz.traits[winner];
      resultTitle.textContent = meta.name;
      resultBadge.textContent = meta.badge;
      resultDesc.textContent = meta.desc;
      resultImage.src = meta.image;
      resultImage.alt = meta.name;
      resultTips.innerHTML = "";
      meta.tips.forEach(t => {
        const item = document.createElement("div");
        item.className = "border border-white/15 rounded-xl px-3 py-2 text-sm text-slate-100";
        item.textContent = `• ${t}`;
        resultTips.appendChild(item);
      });
      quizCard.classList.add("hidden");
      resultCard.classList.remove("hidden");
      progressEl.textContent = "100% 완료";
    }

    function goPrev() {
      if (current === 0) return;
      current -= 1;
      renderQuestion();
    }

    function restart() {
      for (let i = 0; i < answers.length; i += 1) answers[i] = null;
      current = 0;
      quizCard.classList.remove("hidden");
      resultCard.classList.add("hidden");
      progressEl.textContent = "0% 완료";
      renderQuestion();
    }

    prevBtn.addEventListener("click", goPrev);
    restartBtn.addEventListener("click", restart);

    renderQuestion();

    setupKakaoShare("shareKakaoBtn", {
      title: "하찮은 동물 테스트",
      description: "8개의 질문으로 내가 어떤 귀여운 동물인지 알아보는 하찮음 테스트",
      imageUrl: "https://pixabay.com/get/ga65fff30347abb73380b855ac93c08136c8022e760128d4d31f6d3d8ba41d1396b5624b3df244b25f251c264bcc7969b938afa217f6787135fe2edf0089c6c58_1280.jpg",
      webUrl: "https://partygame.pe.kr/brainTest/pages/brainTest/cute-animal-test.html"
    });
  </script>
</body>
</html>
