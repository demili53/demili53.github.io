          { key: "B", text: "일단 수습하고 나중에 정리", trait: "tiger" },
          { key: "C", text: "주변 도움을 받아 공유하며 해결", trait: "dolphin" },
        ]},
        { text: "복잡한 문제를 풀 때?", options: [
          { key: "A", text: "구조를 그리며 분해한다", trait: "owl" },
          { key: "B", text: "직관적으로 핵심부터 건드린다", trait: "tiger" },
          { key: "C", text: "여러 사람 의견을 모아본다", trait: "fox" },
        ]},
      ],
      traits: {
        owl: {
          name: "부엉이",
          tagline: "계획형·분석형",
          image: "https://pixabay.com/get/gb88042469c599f4067e59d7cc5a8a536e4ad442b958446ddbb2bd7977d348cf25f5b9cd5b7324d3e66e81435bb1739109cdc133f2da014fe78f04d5deab40077_1280.jpg",
          desc: "넓게 보고 조용히 계산하는 전략가입니다. 정보를 차분히 모으고 요약해 패턴을 찾고, 실행 전에 리스크를 줄이는 플랜을 세웁니다. 체크리스트와 히스토리를 좋아하며, 팀에서 의사결정 가이드 역할을 합니다.",
          compatibility: {
            best: [
              { trait: "dolphin", reason: "사교성과 분석력이 만나 팀워크가 빠르게 정렬됩니다." },
              { trait: "fox", reason: "유연한 실행력과 계획력이 균형을 이룹니다." }
            ],
            challenge: [
              { trait: "tiger", reason: "속도 우선 사고와 안정 추구가 충돌할 수 있어요." }
            ]
          }
        },
        tiger: {
          name: "호랑이",
          tagline: "주도형·직진형",
          image: "https://pixabay.com/get/ge648e3f226f22c5c486396a7d1226114e0f2f5603e05b987ea70030ead9cf9d60a29cc71822c59c0186074c1e1e20188e7e3848bbe84d9c083f8e7a98564f89e_1280.jpg",
          desc: "목표에 집중하고 추진력이 강한 리더 타입입니다. 거침없는 실행과 빠른 피벗으로 팀의 속도를 끌어올리며, 성과와 명확한 방향성을 중시합니다. 도전적 목표에서 에너지를 얻습니다.",
          compatibility: {
            best: [
              { trait: "fox", reason: "호흡이 맞으면 빠르고 유연한 실행 콤비가 됩니다." },
              { trait: "owl", reason: "장기 전략을 부엉이가 잡아주면 추진력이 더 안정됩니다." }
            ],
            challenge: [
              { trait: "fennec", reason: "신중함과 과감함이 엇갈리면 의사결정이 늦어질 수 있어요." }
            ]
          }
        },
        dolphin: {
          name: "돌고래",
          tagline: "사교형·협력형",
          image: "https://pixabay.com/get/g63a1a8e653cdaed3c1252fea505eb233f880092a64989b3ae3261eb6b4870166879ae3c37143dbba31355cc46c5baa6bfd6f38c86cbf51c5c8bde68501f1aa7f_1280.jpg",
          desc: "팀워크와 소통으로 문제를 풀어가는 타입입니다. 유머와 공감을 섞어 분위기를 부드럽게 만들고, 협업을 통해 창의적 해법을 찾습니다. 사람을 연결하고, 모두가 즐겁게 참여하는 환경을 만듭니다.",
          compatibility: {
            best: [
              { trait: "owl", reason: "소통과 분석이 서로 빈틈을 메워줍니다." },
              { trait: "fennec", reason: "세심함과 공감력이 조합돼 갈등을 줄입니다." }
            ],
            challenge: [
              { trait: "tiger", reason: "결정 속도와 공감 과정이 다르면 피로감을 느낄 수 있어요." }
            ]
          }
        },
        fox: {
          name: "여우",
          tagline: "적응형·유연형",
          image: "https://pixabay.com/get/g503656d71c30ce855362f5c073db90f35b8e2784db600bf9f1532ea1b9b1323db2f3dda4471918ac6952034f2ac5872f827f2aec9f821d64e064aff257f9bcff_1280.jpg",
          desc: "환경에 따라 빠르게 전술을 바꾸는 유연한 해결사입니다. 즉흥적 변화에도 금방 적응하고, 실용적인 선택으로 효율을 챙깁니다. 다양한 관점을 섞어 새로운 조합을 만드는 데 능숙합니다.",
          compatibility: {
            best: [
              { trait: "tiger", reason: "유연한 전술로 호랑이의 추진력을 뒷받침합니다." },
              { trait: "fennec", reason: "섬세함과 기민함이 만나 리스크를 잘 조절합니다." }
            ],
            challenge: [
              { trait: "owl", reason: "계획 대비 즉흥 실행 비율을 맞추는 노력이 필요해요." }
            ]
          }
        },
        fennec: {
          name: "사막여우",
          tagline: "관찰형·신중형",
          image: "https://pixabay.com/get/gcb9142f92267637a81a72df3434a41a832a6fa1cb2fb175a4a6ab705676ca101d05c1a5346041f6ec10d8937c2e1d815e34eaec94bc2ceb174d5984fe8dfbf88_1280.jpg",
          desc: "조용히 살피고 안전을 확보한 뒤 움직이는 안정 추구자입니다. 섬세한 관찰과 깊이 있는 분석으로 리스크를 줄이고, 팀이 넘어갈 함정을 미리 발견합니다. 차분하지만 꾸준한 성취를 선호합니다.",
          compatibility: {
            best: [
              { trait: "dolphin", reason: "공감 능력과 섬세함이 만나 조직 온도를 지켜줍니다." },
              { trait: "fox", reason: "위험 감지와 기민한 실행이 절묘하게 조합됩니다." }
            ],
            challenge: [
              { trait: "tiger", reason: "과감한 결정과 신중함이 부딪히면 피로감을 줄 수 있어요." }
            ]
          }
        },
      }
    };

    const questionText = document.getElementById("questionText");
    const stepLabel = document.getElementById("stepLabel");
    const progressLabel = document.getElementById("progressLabel");
    const progressPercent = document.getElementById("progressPercent");
    const progressBar = document.getElementById("progressBar");
    const optionButtons = Array.from(document.querySelectorAll(".option-btn"));
    const prevBtn = document.getElementById("prevBtn");
    const skipBtn = document.getElementById("skipBtn");
    const questionCard = document.getElementById("questionCard");
    const resultCard = document.getElementById("resultCard");
    const resultTitle = document.getElementById("resultTitle");
    const resultDesc = document.getElementById("resultDesc");
    const resultBadges = document.getElementById("resultBadges");
    const restartBtn = document.getElementById("restartBtn");
    const resultImage = document.getElementById("resultImage");

    let current = 0;
    let currentQuestions = data.questions;
    let traitMeta = data.traits;
    let answers = new Array(currentQuestions.length).fill(null);
    const shareContent = {
      title: data.title,
      description: "9개의 질문으로 나와 닮은 동물을 찾아주는 테스트",
      imageUrl: "https://partygame.pe.kr/brainTest/images/tiger.png",
      webUrl: "https://partygame.pe.kr/brainTest/pages/brainTest/animal-test.html"
    };

    function renderQuestion() {
      const q = currentQuestions[current];
      questionText.textContent = q.text;
      stepLabel.textContent = `문항 ${current + 1}`;
      progressLabel.textContent = `${current + 1} / ${currentQuestions.length}`;
      const percent = Math.round(((current) / currentQuestions.length) * 100);
      progressPercent.textContent = `${percent}%`;
      progressBar.style.width = `${percent}%`;

      optionButtons.forEach((btn, idx) => {
        const opt = q.options[idx];
        btn.textContent = `${opt.key}. ${opt.text}`;
        btn.dataset.trait = opt.trait;
        const isSelected = answers[current]?.key === opt.key;
        btn.className = `option-btn w-full text-left px-4 py-3 rounded-xl border transition ${
          isSelected
            ? "border-indigo-300 bg-white/15 shadow-md"
            : "border-white/15 hover:border-indigo-200 hover:bg-white/10"
        }`;
      });

      prevBtn.disabled = current === 0;
    }

    function updateTraitQuery(traitKey) {
      const url = new URL(window.location.href);
      if (traitKey) {
        url.searchParams.set("trait", traitKey);
      } else {
        url.searchParams.delete("trait");
      }
      const next = `${url.pathname}${url.search}${url.hash || ""}`;
      window.history.replaceState({}, "", next);
    }

    function renderTraitProfile(traitKey) {
      const meta = traitMeta[traitKey];
      if (!meta) return;
      resultBadges.innerHTML = "";
      const badge = document.createElement("span");
      badge.className = "inline-flex items-center gap-2 px-3 py-2 rounded-full bg-white/10 border border-white/20 text-sm";
      badge.textContent = `${meta.name} · ${meta.tagline}`;
      resultBadges.appendChild(badge);

      resultTitle.textContent = `당신을 닮은 동물: ${meta.name}`;
      resultImage.src = meta.image || "";
      resultImage.alt = meta.name;
      resultDesc.textContent = `• ${meta.name} (${meta.tagline}) — ${meta.desc}`;
      renderCompatibility(meta);
      shareContent.title = `${meta.name} | 동물 성격 심리 테스트`;
      shareContent.description = meta.desc;
      shareContent.imageUrl = meta.image || shareContent.imageUrl;
      progressLabel.textContent = `${currentQuestions.length} / ${currentQuestions.length}`;
      progressPercent.textContent = "100%";
      progressBar.style.width = "100%";
      questionCard.classList.add("hidden");
      resultCard.classList.remove("hidden");
    }

    function showTraitProfile(traitKey) {
      renderTraitProfile(traitKey);
      updateTraitQuery(traitKey);
    }

    function showResult() {
      const counts = Object.create(null);
      const tieBreak = Object.create(null);
      answers.forEach((ans, idx) => {
        if (!ans) return;
        counts[ans.trait] = (counts[ans.trait] || 0) + 1;
        const weight = currentQuestions.length - idx;
        tieBreak[ans.trait] = (tieBreak[ans.trait] || 0) + weight;
      });
      const ranked = Object.keys(counts).sort((a, b) => {
        if (counts[b] !== counts[a]) return counts[b] - counts[a];
        return (tieBreak[b] || 0) - (tieBreak[a] || 0);
      });
      if (ranked.length === 0) {
        resultTitle.textContent = "아직 선택이 없어요";
        resultDesc.textContent = "문항을 선택해 결과를 확인해 주세요.";
        resultBadges.innerHTML = "";
        document.getElementById("resultCompatibility").innerHTML = "";
        return;
      }

      const primary = ranked[0];
      showTraitProfile(primary);
    }

    function renderCompatibility(meta) {
      const container = document.getElementById("resultCompatibility");
      if (!meta.compatibility) {
        container.innerHTML = "";
        return;
      }
      const section = document.createElement("div");
      section.className = "rounded-2xl bg-white/5 border border-white/10 p-4 space-y-3";
      const title = document.createElement("div");
      title.className = "text-sm font-semibold text-indigo-200 tracking-widest uppercase";
      title.textContent = "궁합 리포트";
      section.appendChild(title);

      const bestBlock = document.createElement("div");
      bestBlock.innerHTML = `<p class="text-indigo-100 text-sm mb-2">잘 맞는 타입</p>`;
      meta.compatibility.best?.forEach(info => {
        const item = createCompatibilityItem(info);
        if (item) bestBlock.appendChild(item);
      });
      section.appendChild(bestBlock);

      const challengeBlock = document.createElement("div");
      challengeBlock.innerHTML = `<p class="text-indigo-100 text-sm mb-2">주의할 타입</p>`;
      meta.compatibility.challenge?.forEach(info => {
        const item = createCompatibilityItem(info);
        if (item) challengeBlock.appendChild(item);
      });
      section.appendChild(challengeBlock);

      container.innerHTML = "";
      container.appendChild(section);
    }

    function createCompatibilityItem(info) {
      const traitInfo = traitMeta[info.trait];
      if (!traitInfo) return null;
      const link = document.createElement("a");
      link.href = `?trait=${info.trait}#result`;
      link.className = "flex flex-col gap-1 text-left text-slate-50 text-sm border border-white/15 rounded-xl px-3 py-2 mb-2 hover:border-indigo-200 hover:bg-white/10 transition trait-link";
      link.innerHTML = `<span class="font-semibold text-indigo-100">${traitInfo.name}</span><span class="text-xs text-slate-200">${info.reason}</span>`;
      link.addEventListener("click", (evt) => {
        evt.preventDefault();
        showTraitProfile(info.trait);
      });
      return link;
    }

    function handleOption(key) {
      const q = currentQuestions[current];
      const selected = q.options.find(o => o.key === key);
      answers[current] = selected;

      if (current === currentQuestions.length - 1) {
        showResult();
        return;
      }
      current += 1;
      renderQuestion();
    }

    function goPrev() {
      if (current === 0) return;
      current -= 1;
      renderQuestion();
    }

    function skipQuestion() {
      if (current === currentQuestions.length - 1) {
        showResult();
        return;
      }
      current += 1;
      renderQuestion();
    }

    function restart() {
      for (let i = 0; i < answers.length; i += 1) answers[i] = null;
      current = 0;
      updateTraitQuery(null);
      resultCard.classList.add("hidden");
      questionCard.classList.remove("hidden");
      renderQuestion();
    }

    optionButtons.forEach(btn => {
      btn.addEventListener("click", () => handleOption(btn.dataset.key || btn.textContent[0]));
    });
    prevBtn.addEventListener("click", goPrev);
    skipBtn.addEventListener("click", skipQuestion);
    restartBtn.addEventListener("click", restart);

    renderQuestion();
    const initialTrait = new URLSearchParams(window.location.search).get("trait");
    if (initialTrait && traitMeta[initialTrait]) {
      renderTraitProfile(initialTrait);
    }

    setupKakaoShare("shareKakaoBtn", shareContent);
  </script>
</body>
</html>
